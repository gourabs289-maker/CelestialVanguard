<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Vanguard | 3D Space Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="hud-item">HP: <span id="health-val">100</span></div>
            <div class="hud-item">SCORE: <span id="score-val">0</span></div>
            <div class="hud-item" id="stage-name">GALAXY TRANSIT</div>
        </div>

        <div id="menu" class="overlay">
            <h1>CELESTIAL VANGUARD</h1>
            <p>A Professional 3D Space Adventure</p>
            <button id="start-btn" class="btn">Launch Mission</button>
            <div style="margin-top: 30px; font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">
                WASD TO NAVIGATE | MOUSE TO FIRE
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
