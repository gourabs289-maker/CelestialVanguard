<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Celestial Vanguard: Lunar Breach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="hud-item">HEALTH: <span id="health-val">100</span></div>
            <div class="hud-item">SCORE: <span id="score-val">0</span></div>
            <div class="hud-item" id="stage-name">STAGE: NEBULA</div>
        </div>

        <div id="menu" class="overlay">
            <h1>CELESTIAL VANGUARD</h1>
            <p>Defend the Galaxy. Reclaim the Moon.</p>
            <button id="start-btn" class="btn">Launch Mission</button>
            <div style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">
                WASD to Move | Mouse to Shoot<br>
                (Touch Controls Enabled for Mobile)
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <h1 id="over-title">MISSION FAILED</h1>
            <p id="over-msg">The Void has consumed the sector.</p>
            <button id="retry-btn" class="btn">Retry Mission</button>
        </div>

        <div id="joystick-container">
            <div id="joystick-handle"></div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
